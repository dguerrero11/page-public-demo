apiVersion: apps/v2
kind: Deployment
metadata:
  name: page-demo
  namespace: demo
  labels:
    app: page-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: page-demo
  template:
    metadata:
      labels:
        app: page-demo
    spec:
      containers:
        - name: page-demo
          image: guerrero11dan/page-public-demo:v1   # ArgoCD detecta cambios aquí
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
